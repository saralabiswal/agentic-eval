case_id: CP-001
scenario: churn_prevention
customer_id: C003
description: "High churn signal from NPS drop and lower login frequency"
input:
  customer_profile:
    churn_probability: 0.82
    nps_delta_30d: -20
    login_frequency_delta_30d: -0.58
    card_utilization: 0.32
    missed_pmts_90d: 0
    checking_balance: 1880.10
    risk_score: 0.22
    crm_available: true
    sources_degraded: []
  retrieved_policy_chunks:
    - document_id: KB-CHURN-001
      version: "1.3"
      content: >
        Customers with churn probability above 0.75 and NPS decline
        of 15 points or more qualify for retention outreach.
    - document_id: KB-CHURN-004
      version: "1.1"
      content: >
        A login frequency decline greater than 40% is a high engagement
        deterioration signal and should be included in retention reasoning.
  scenario_context: >
    Assess churn risk and recommend a retention action for a customer
    with worsening satisfaction and engagement.
expected:
  risk_level: HIGH
  should_reference_policy: true
  key_signals:
    - churn_probability
    - nps_drop
    - login_frequency
  should_not_claim:
    - payment_delinquency
    - hardship_eligible
  expected_action_type: RETENTION_OUTREACH
evaluation_criteria:
  faithfulness_threshold: 0.85
  answer_relevance_threshold: 0.80
  context_precision_threshold: 0.70
  consistency_threshold: 0.90
  consistency_runs: 5
  max_latency_ms: 10000
